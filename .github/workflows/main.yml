name: Build FlexScroll IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project FlexScroll.xcodeproj \
            -scheme FlexScroll \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS=arm64 \
            | xcpretty || true

      - name: Package as IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/FlexScroll.app
          zip -r FlexScroll.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlexScroll-IPA
          path: FlexScroll.ipa
          retention-days: 7

name: FlexScroll
options:
  bundleIdPrefix: com.jose
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"

targets:
  FlexScroll:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - FlexScroll
    info:
      path: FlexScroll/Info.plist
      properties:
        CFBundleDisplayName: FlexScroll
        CFBundleName: FlexScroll
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "A câmara é usada para detetar as tuas flexões em tempo real."
        NSMicrophoneUsageDescription: "Necessário para acesso à câmara no iOS."
        UILaunchStoryboardName: ""
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jose.flexscroll
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: "NO"
        ARCHS: arm64
